spring:
  application:
    name: policy-router

  datasource:
    url: jdbc:postgresql://localhost:5433/policyrouter
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

app:
  queue:
    name: message-queue
    dlq-name: message-dlq
    worker-delay: 2000
    max-retry: 3
  channels:
    email:
      from: noreply@grootan.com
    sms:
      placeholder: true
  jwt:
    secret: 3f8a1b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
    expiration: 86400000

logging:
  level:
    com.grootan: DEBUG
    org.flywaydb: INFO