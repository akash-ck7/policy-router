spring:
  application:
    name: policy-router

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/policyrouter}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

app:
  queue:
    name: ${QUEUE_NAME:message-queue}
    dlq-name: ${DLQ_NAME:message-dlq}
    worker-delay: ${WORKER_DELAY:2000}
    max-retry: ${MAX_RETRY:3}
  channels:
    email:
      from: ${EMAIL_FROM:noreply@grootan.com}
      sendgrid-api-key: ${SENDGRID_API_KEY:}
    sms:
      fast2sms-api-key: ${FAST2SMS_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.grootan: DEBUG
    org.flywaydb: INFO